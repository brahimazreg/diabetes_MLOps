on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run:  pytest tests/

      - name: Check imports
        run: python -c "from src.api import app; from src.predict import predict"

      - name: Build Docker image
        run: docker build -t diabetes-api .
      
      - name: Download dataset
        run: |
          mkdir -p data/raw
          curl -o data/raw/diabetes.csv https://raw-url-here/diabetes.csv